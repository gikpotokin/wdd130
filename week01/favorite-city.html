  <h1>Lagos, Nigeria</h1>

  <p>Lagos is vibrant, coastal, and full of creative energy. From the bustling markets to the music, 
     the city buzzes with opportunity and culture.</p>

  <p>I love the mix of innovation and tradition, the food, and the endless inspiration by the Atlantic coastline.</p>
